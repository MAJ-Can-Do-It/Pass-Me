<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pass Me — Find a Tutor at CAU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:       oklch(0.48 0.26 278);
      --purple-mid:   oklch(0.60 0.22 278);
      --purple-light: oklch(0.90 0.08 278);
      --purple-pale:  oklch(0.97 0.02 278);
      --coral:        oklch(0.56 0.20 35);
      --mint:         oklch(0.48 0.16 168);
      --text:         oklch(0.16 0.04 278);
      --text2:        oklch(0.42 0.05 278);
      --text3:        oklch(0.62 0.04 278);
      --border:       oklch(0.91 0.03 278);
      --bg:           oklch(0.985 0.01 278);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    #root { min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--purple-light); border-radius: 99px; }

    /* Layout utility */
    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* Form focus ring */
    input:focus, select:focus, textarea:focus {
      border-color: oklch(0.48 0.26 278) !important;
      box-shadow: 0 0 0 3px oklch(0.48 0.26 278 / 0.12);
    }

    /* Smooth page transitions */
    main > div {
      animation: fadeIn 0.22s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="pages1.jsx"></script>
  <script type="text/babel" src="pages2.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
